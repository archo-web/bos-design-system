name: Deploy Design System Site to GitHub Pages

# ==========================================================
# 트리거 — main 브랜치에 push될 때마다 자동 실행
# site/ 폴더가 변경되면 GitHub Pages에 새로 배포됨
# ==========================================================

on:
  push:
    branches: [main]
    # site/ 폴더 또는 이 워크플로우 파일 변경 시에만 실행 (효율적)
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'

  # GitHub UI의 Actions 탭에서 수동 실행 허용
  workflow_dispatch:

# 동시 실행 방지 (같은 커밋에 대해 여러 번 돌지 않게)
concurrency:
  group: 'pages'
  cancel-in-progress: true

# GitHub Pages에 배포하기 위한 권한
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ==========================================================
  # 1. 빌드 — site/ 폴더 내용을 배포 가능한 형태로 준비
  # ==========================================================
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # site/ 폴더만 배포 (docs/, tokens/ 등은 제외)
          path: './site'

  # ==========================================================
  # 2. 배포 — GitHub Pages에 실제 올리기
  # ==========================================================
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
